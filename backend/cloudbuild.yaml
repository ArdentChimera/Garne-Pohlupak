# Google Cloud Build configuration for automatic deployment
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:latest'
      - 'backend'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'garne-pohlupak-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/garne-pohlupak-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
